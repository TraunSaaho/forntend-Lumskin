<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="stylel-sign.css">
</head>

<body>

    <div class="container">

        <!-- LEFT SECTION -->
        <div class="left-section">
            <div class="text-box">
                <h1>Find a skincare<br>routine that works.</h1>
                <p>
                    Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                    Suspendisse varius enim in eros elementum tristique.
                    Duis cursus, mi quis viverra ornare, eros dolor interdum nulla.
                </p>
            </div>

            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1612817288484-6f916006741a?q=80&w=1200" alt="Skincare">
            </div>
        </div>

        <!-- RIGHT SECTION -->
        <div class="right-section">
            <div class="form-box">
                <h2>Create a free account</h2>

                <form id="signupForm">
                    <input type="text" id="signupName" placeholder="Enter your name" required autocomplete="name">
                    <input type="email" id="signupEmail" placeholder="Enter your email" required autocomplete="email">
                    <input type="password" id="signupPassword" placeholder="Password (min 8 chars)" required autocomplete="new-password" minlength="8">
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required autocomplete="new-password" minlength="8">

                    <button type="submit" class="primary-btn">Sign up</button>

                    <button type="button" class="google-btn">
                        Continue with Google
                    </button>

                    <p class="switch-text">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>
                </form>
            </div>
        </div>

    </div>
    <script type="module" src="./scriptlogin-enhanced.js"></script>
</body>

</html>
</html>
