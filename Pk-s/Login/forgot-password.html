<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style login.css">
    <style>
        .forgot-password-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #ff6b00;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .form-box h2 {
            margin-bottom: 10px;
        }
        
        .form-box p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="right-section">
            <div class="form-box">
                <a href="login.html" class="back-link">← Back to Login</a>

                <h2>Reset Password</h2>
                <p>Enter your email address and we'll send you a link to reset your password.</p>

                <form id="resetForm">
                    <input type="email" id="resetEmail" placeholder="Enter your email" required autocomplete="email">
                    <button type="submit" class="primary-btn">Send Reset Link</button>
                </form>

                <p class="switch-text" style="margin-top: 20px;">
                    Don't have an account?
                    <a href="signup.html">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="./scriptlogin-enhanced.js"></script>
</body>

</html>
