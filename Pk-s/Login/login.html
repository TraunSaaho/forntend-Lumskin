<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style-login.css">
</head>

<body>

    <div class="container">

        <!-- LEFT SECTION -->
        <div class="left-section">
            <div class="text-box" style="background-color: white;">
                <h1>Welcome Back.</h1>
                <p>
                    Continue your skincare journey with personalized routines
                    tailored just for you.
                </p>
            </div>

            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1612817288484-6f916006741a?q=80&w=1200" alt="Skincare">
            </div>
        </div>

        <!-- RIGHT SECTION -->
        <div class="right-section">
            <div class="form-box">
                <h2>Login to your account</h2>

                <form id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Enter your email" required autocomplete="email">
                    <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">

                    <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" id="rememberMe" style="cursor: pointer;">
                            <span style="font-size: 14px;">Remember me</span>
                        </label>
                        <a href="forgot-password.html" style="font-size: 14px; color: #ff6b00; text-decoration: none;">Forgot password?</a>
                    </div>

                    <button type="submit" class="primary-btn">Login</button>

                    <button type="button" class="google-btn" style="color: black;">
                        Continue with Google
                    </button>

                    <p class="switch-text">
                        Don't have an account?
                        <a href="signup.html">Sign up</a>
                    </p>
                </form>
            </div>
        </div>

    </div>



    <script>

function loginUser(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email === "" || password === ""){
        alert("Please enter email and password");
        return;
    }

    // Save login session
    localStorage.setItem("lumiskinUser", email);

    alert("Login Successful");

    // Redirect to home page
    window.location.href = "../index.html";
}

</script>

    <script type="module" src="./scriptlogin-enhanced.js"></script>
</body>

</html>
